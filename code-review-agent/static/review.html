<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PR / Diff 审查 · AI Code Reviewer</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/base16/one-light.min.css" />
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a class="logo" href="/">
      <div class="logo-mark">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M7 1.5L9 5H12L9.5 7.5L10.5 11L7 9L3.5 11L4.5 7.5L2 5H5L7 1.5Z" fill="white"/>
        </svg>
      </div>
      <span class="logo-name">AI Code Reviewer</span>
    </a>
    <div class="header-sep"></div>
    <a class="back-link" href="/">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M9 2.5L4.5 7L9 11.5" stroke="currentColor" stroke-width="1.5"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      返回
    </a>
  </div>
</header>

<div class="page-body page-fade">
  <div class="container" style="max-width:680px">

    <!-- Page header -->
    <div style="margin-bottom:28px">
      <span class="badge badge-neutral" style="margin-bottom:12px;display:inline-flex">
        ◈ 需要一定代码基础
      </span>
      <h1 style="font-family:var(--font-serif);font-size:28px;font-weight:400;
                 color:var(--text);margin-bottom:8px;letter-spacing:-.02em">
        GitHub PR / Diff 审查
      </h1>
      <p style="font-size:14px;color:var(--text-2)">
        通过 PR URL 或粘贴 diff 文本，获取结合代码上下文的深度审查报告
      </p>
    </div>

    <!-- Form card with tabs -->
    <div class="card" id="form-card">

      <div class="tabs" role="tablist">
        <button class="tab active" data-tab="pr"   role="tab">🔗&nbsp; GitHub PR URL</button>
        <button class="tab"        data-tab="diff" role="tab">📋&nbsp; 粘贴 Diff</button>
      </div>

      <!-- Panel: PR URL -->
      <div class="tab-panel active" id="panel-pr">
        <div class="field">
          <label class="label" for="pr-url">Pull Request URL</label>
          <input id="pr-url" class="input" type="url"
                 placeholder="https://github.com/owner/repo/pull/123"
                 autocomplete="off" />
          <p class="field-hint">
            需要服务器配置 GITHUB_TOKEN；支持 public / private 仓库（有权限）
          </p>
        </div>
        <div class="error-msg" id="err-pr"></div>
        <button class="btn btn-accent btn-full" id="btn-pr" style="margin-top:4px">
          开始审查
        </button>
      </div>

      <!-- Panel: Diff text -->
      <div class="tab-panel" id="panel-diff">
        <div class="field">
          <label class="label" for="repo-diff">项目名称</label>
          <input id="repo-diff" class="input" type="text"
                 placeholder="my-org / my-repo" autocomplete="off" />
        </div>
        <div class="field">
          <label class="label" for="diff-txt">Diff 内容</label>
          <textarea id="diff-txt" class="textarea" rows="10"
            placeholder="粘贴 git diff 输出...&#10;&#10;diff --git a/app.py b/app.py&#10;--- a/app.py&#10;+++ b/app.py&#10;@@ -1,5 +1,6 @@&#10; import os&#10;+password = &quot;hardcoded123&quot;"></textarea>
          <p class="field-hint">
            支持 GitLab / Gitea / 本地 git diff 输出的 unified diff 格式
          </p>
        </div>
        <div class="error-msg" id="err-diff"></div>
        <button class="btn btn-accent btn-full" id="btn-diff" style="margin-top:4px">
          开始审查
        </button>
      </div>

    </div><!-- /form-card -->

    <!-- Progress -->
    <div class="progress-wrap" id="progress-wrap">
      <div class="prog-track">
        <div class="prog-fill" id="prog-fill"></div>
      </div>
      <div class="prog-title">审查进行中</div>
      <div class="prog-sub">
        通常需要 1–3 分钟 &nbsp;·&nbsp; 已用时 <span class="elapsed" id="elapsed">0s</span>
      </div>
      <div class="steps" id="steps"></div>
    </div>

    <!-- Results -->
    <div class="result-wrap" id="result-wrap">
      <div class="result-bar">
        <div class="result-bar-title">
          审查报告
          <span class="badge badge-red"  id="badge-sec">0 安全</span>
          <span class="badge badge-blue" id="badge-qual">0 质量</span>
        </div>
        <div class="result-actions">
          <button class="btn-sm" id="btn-copy">复制</button>
          <button class="btn-sm" id="btn-dl">下载 .md</button>
          <a class="btn btn-ghost" href="/" style="padding:6px 12px;font-size:12px">新建审查</a>
        </div>
      </div>
      <div class="result-body">
        <div class="md" id="report-body"></div>
      </div>
    </div>

  </div>
</div>

<footer class="site-footer">
  AI Code Reviewer &middot; 由 LangGraph 驱动
</footer>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="app.js"></script>
<script>
const mgr = new ReviewManager('pr');

// ── Tab switching ────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;
    mgr.mode  = tab;
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`panel-${tab}`).classList.add('active');
  });
});

function hideForm() { document.getElementById('form-card').style.display = 'none'; }
function showForm() { document.getElementById('form-card').style.display = 'block'; }

// ── PR URL submit ────────────────────────────────────────────────
document.getElementById('btn-pr').addEventListener('click', async () => {
  const errEl = document.getElementById('err-pr');
  errEl.classList.remove('on');

  const url = document.getElementById('pr-url').value.trim();
  if (!url) {
    errEl.textContent = '⚠  请输入 GitHub PR URL';
    errEl.classList.add('on'); return;
  }
  if (!url.includes('github.com')) {
    errEl.textContent = '⚠  请输入有效的 GitHub PR URL（含 github.com）';
    errEl.classList.add('on'); return;
  }

  mgr.mode = 'pr';
  hideForm();
  mgr.showProgress();

  try {
    const data = await apiPost('/api/review', { mode: 'pr_url', pr_url: url });
    mgr.startPolling(data.session_id);
  } catch (e) {
    showForm();
    mgr.progressWrap.classList.remove('on');
    errEl.textContent = '⚠  ' + e.message;
    errEl.classList.add('on');
  }
});

// ── Diff text submit ─────────────────────────────────────────────
document.getElementById('btn-diff').addEventListener('click', async () => {
  const errEl = document.getElementById('err-diff');
  errEl.classList.remove('on');

  const diff = document.getElementById('diff-txt').value.trim();
  const repo = document.getElementById('repo-diff').value.trim() || 'my-project';

  if (!diff) {
    errEl.textContent = '⚠  请粘贴 diff 内容';
    errEl.classList.add('on'); return;
  }

  mgr.mode = 'diff';
  hideForm();
  mgr.showProgress();

  try {
    const data = await apiPost('/api/review', {
      mode: 'diff_text', diff_content: diff, repo_name: repo,
    });
    mgr.startPolling(data.session_id);
  } catch (e) {
    showForm();
    mgr.progressWrap.classList.remove('on');
    errEl.textContent = '⚠  ' + e.message;
    errEl.classList.add('on');
  }
});

// ── Actions ──────────────────────────────────────────────────────
document.getElementById('btn-copy').addEventListener('click', function () { mgr.copyReport(this); });
document.getElementById('btn-dl').addEventListener('click', () => mgr.downloadReport());
</script>
</body>
</html>
